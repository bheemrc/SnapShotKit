name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          latest="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)"
          if [ -n "$latest" ]; then
            sudo xcode-select -switch "$latest"
          fi

      - name: Show Swift version
        run: swift --version

      - name: Build (release)
        run: swift build -c release
